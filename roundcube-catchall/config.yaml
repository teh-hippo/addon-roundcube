---
name: Roundcube Catch-all
version: dev
slug: roundcube-catchall
description: Identity auto-create on reply, optional autologin, and optional Forward Email API integration for catch-all Roundcube setups
url: https://github.com/teh-hippo/addon-roundcube
init: false
arch:
  - aarch64
  - amd64
stage: experimental
apparmor: false
map:
  - share:rw
options:
  domain: ""
  identity_autocreate: true
  autologin: false
  autologin_user: ""
  autologin_password: ""
  forward_email_api_key: ""
  forward_email_auto_delete: false
  log_level: info
schema:
  domain: match(^(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.(?!-)[A-Za-z0-9-]{1,63}(?<!-))+$)
  identity_autocreate: bool?
  autologin: bool?
  autologin_user: match(^$|^[^@\s]+@(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.(?!-)[A-Za-z0-9-]{1,63}(?<!-))+$)?
  autologin_password: password?
  forward_email_api_key: password?
  forward_email_auto_delete: bool?
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
