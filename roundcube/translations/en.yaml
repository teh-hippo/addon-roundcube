---
configuration:
  imap_host:
    name: IMAP Server
    description: >-
      Full IMAP URL with prefix and port. Use ssl:// (implicit TLS, typically
      port 993) or tls:// (STARTTLS, typically port 143). Example:
      ssl://imap.example.com:993
  smtp_host:
    name: SMTP Server
    description: >-
      Full SMTP URL with prefix and port. Use ssl:// (implicit TLS, typically
      port 465) or tls:// (STARTTLS, typically port 587). Example:
      ssl://smtp.example.com:465
  log_level:
    name: Log Level
    description: Verbosity of add-on log output.
  plugins:
    name: Additional Roundcube plugins
    description: >-
      Optional. Packagist package names to install via composer at startup.
      For a catch-all mailbox, add teh-hippo/roundcube-catchall. Leave empty
      for the default set.
