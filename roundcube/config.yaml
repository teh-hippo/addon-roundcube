---
name: Roundcube Webmail
version: dev
slug: roundcube
description: Roundcube webmail client for any IMAP server
url: https://github.com/teh-hippo/addon-roundcube
init: false
startup: application
boot: auto
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8099
panel_icon: mdi:email
panel_title: Webmail
panel_admin: false
stage: experimental
apparmor: false
watchdog: "http://[HOST]:[PORT:8099]/"
ports:
  80/tcp: null
ports_description:
  80/tcp: Web interface (optional direct access)
map:
  - ssl:ro
options:
  imap_host: "ssl://imap.example.com"
  imap_port: 993
  smtp_host: "ssl://smtp.example.com"
  smtp_port: 465
  ssl: false
  certfile: fullchain.pem
  keyfile: privkey.pem
  log_level: info
schema:
  imap_host: str
  imap_port: port
  smtp_host: str
  smtp_port: port
  ssl: bool
  certfile: str
  keyfile: str
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
