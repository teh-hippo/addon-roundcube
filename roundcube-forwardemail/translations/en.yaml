---
configuration:
  api_key:
    name: Forward Email API key (optional)
    description: >-
      API key from https://forwardemail.net/my-account/security. Leave blank
      if you use a wildcard alias (*@domain) with SMTP credentials for all
      outbound — in that case the add-on skips the per-alias API dance and
      relies on the auto-login credentials below.
  domain:
    name: Forward Email domain
    description: >-
      Domain registered with Forward Email (e.g. example.com). Aliases are
      created under this domain when you add a new identity in Roundcube.
  auto_create:
    name: Pre-fill From on reply
    description: >-
      When enabled, replying to a catch-all address pre-fills the From
      field with that address and creates a matching identity. In API-key
      mode, also provisions the alias + SMTP credentials on Forward Email.
  auto_delete:
    name: Auto-delete aliases on identity removal
    description: >-
      When enabled, removing a Roundcube identity also deletes its alias
      on Forward Email. Leave off unless you understand the risk.
  autologin:
    name: Skip Roundcube login screen
    description: >-
      When enabled, Roundcube auto-logs in as the configured user. Anyone
      who can reach this Roundcube instance is logged in as that identity
      (Home Assistant Ingress is the gate). Single-identity only — log out
      is not meaningful while this is on.
  autologin_user:
    name: Auto-login email
    description: >-
      Full email address to auto-login as (e.g. inbox@example.com). Must
      be on the configured domain. Required when "Skip Roundcube login
      screen" is enabled.
  autologin_password:
    name: Auto-login password
    description: >-
      IMAP/SMTP password for the auto-login email. Generate it from the
      Forward Email dashboard (Domain → Aliases → Generate Password).
      Required when "Skip Roundcube login screen" is enabled.
  log_level:
    name: Log Level
    description: Verbosity of add-on log output.
