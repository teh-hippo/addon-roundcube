---
name: Roundcube Forward Email
version: dev
slug: roundcube-forwardemail
description: Catch-all alias & SMTP auto-provisioning for the Roundcube Webmail add-on, via Forward Email
url: https://github.com/teh-hippo/addon-roundcube
init: false
arch:
  - aarch64
  - amd64
stage: experimental
apparmor: false
map:
  - share:rw
options:
  api_key: ""
  domain: ""
  auto_create: true
  auto_delete: false
  log_level: info
schema:
  api_key: password?
  domain: match(^(?!-)[A-Za-z0-9-]{1,63}(?<!-)(\.(?!-)[A-Za-z0-9-]{1,63}(?<!-))+$)?
  auto_create: bool?
  auto_delete: bool?
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
